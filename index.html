<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Urban Spice | Fine Dining Reimagined</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
            --accent: #d4af37;
            --text: #ffffff;
            --font-main: 'Inter', sans-serif;
            --font-display: 'Playfair Display', serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none; }
        body { background: var(--bg); color: var(--text); font-family: var(--font-main); overflow-x: hidden; }

        /* Custom Cursor */
        .cursor { width: 20px; height: 20px; border: 1px solid var(--accent); border-radius: 50%; position: fixed; pointer-events: none; z-index: 9999; transition: transform 0.1s ease; }

        /* Loading Screen */
        #loader { position: fixed; inset: 0; background: var(--bg); z-index: 10000; display: flex; align-items: center; justify-content: center; font-size: 2rem; font-family: var(--font-display); }

        /* Hero */
        .hero { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; background: radial-gradient(circle at center, #1a1a1a 0%, #0a0a0a 100%); }
        .hero h1 { font-size: 8rem; line-height: 0.9; margin-bottom: 2rem; opacity: 0; transform: translateY(50px); animation: reveal 1s forwards; }
        
        /* Glassmorphism UI */
        .glass-card { background: var(--glass); backdrop-filter: blur(20px); border: 1px solid var(--border); border-radius: 20px; padding: 2rem; }

        /* Animations */
        @keyframes reveal { to { opacity: 1; transform: translateY(0); } }
        .reveal-on-scroll { opacity: 0; transform: translateY(100px); transition: all 1s cubic-bezier(0.16, 1, 0.3, 1); }
        .is-visible { opacity: 1; transform: translateY(0); }

        /* Buttons */
        .btn { padding: 1.5rem 3rem; background: transparent; border: 1px solid var(--accent); color: var(--accent); cursor: pointer; transition: 0.5s; text-transform: uppercase; letter-spacing: 2px; }
        .btn:hover { background: var(--accent); color: var(--bg); }
    </style>
</head>
<body>

    <div class="cursor" id="cursor"></div>
    <div id="loader">THE URBAN SPICE</div>

    <nav style="position: fixed; top: 0; width: 100%; padding: 2rem; display: flex; justify-content: space-between; z-index: 100;">
        <div style="font-size: 1.5rem; font-weight: bold;">URBAN SPICE</div>
        <div>Menu / Reservations</div>
    </nav>

    <section class="hero">
        <h1 id="hero-text">Fine Dining<br>Reimagined</h1>
        <p style="margin-bottom: 3rem; font-size: 1.2rem; max-width: 500px;">Experience the perfect alchemy of traditional flavors and modern culinary artistry.</p>
        <button class="btn">Reserve Table</button>
    </section>

    <section style="padding: 100px 10%;" id="about">
        <div class="reveal-on-scroll glass-card">
            <h2 style="font-family: var(--font-display); font-size: 4rem;">The Culinary Philosophy</h2>
            <p style="margin-top: 2rem; line-height: 1.8; color: #aaa;">Where every ingredient tells a story of origin, craft, and passion.</p>
        </div>
    </section>

    <script>
        // Custom Cursor Logic
        const cursor = document.getElementById('cursor');
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        // Intersection Observer for Scroll Animations
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) entry.target.classList.add('is-visible');
            });
        }, { threshold: 0.1 });

        document.querySelectorAll('.reveal-on-scroll').forEach(el => observer.observe(el));

        // Loader
        window.addEventListener('load', () => {
            document.getElementById('loader').style.display = 'none';
        });
    </script>
</body>
</html>
